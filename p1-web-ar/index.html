<!DOCTYPE html>
<html>
  <head>
    <title>電脳タグ P3</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- 公式 hello-world と同じ2本構成: 位置計算の本体(THREEx) → A-Frame用ラッパ -->
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.7/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <!-- ブロック2: ここからAR空間。カメラ映像を背景にする -->
    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
      renderer="antialias: true; alpha: true">
      <a-camera gps-new-camera="gpsMinDistance: 5"></a-camera>
      <!-- 箱はDBから来てJSが動的に追加する -->
    </a-scene>

    <!-- ブロック9: タグ一覧（自分/他人の色分け＋🗑で削除を試す） -->
    <div id="list" style="position:fixed; top:0; left:0; right:0; z-index:9999; max-height:38%; overflow:auto; background:rgba(0,0,0,0.55); color:#fff; font:13px sans-serif; padding:6px;"></div>

    <!-- ブロック7: タグを貼るUI（画面下のバー） -->
    <div id="status" style="position:fixed; left:0; right:0; bottom:56px; z-index:9999; color:#0f0; font:13px monospace; padding:4px 8px; background:rgba(0,0,0,0.45);"></div>
    <div id="ui" style="position:fixed; left:0; right:0; bottom:0; z-index:9999; display:flex; gap:6px; padding:8px; background:rgba(0,0,0,0.5);">
      <input id="body" placeholder="ここに貼るメモ" style="flex:1; font-size:16px; padding:8px; border-radius:6px; border:none;">
      <button id="post" style="font-size:16px; padding:8px 12px; border-radius:6px; border:none; background:#2ecc40; color:#fff;">ここに貼る</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // ===== ブロック6: Supabaseに接続 =====
      const SUPABASE_URL  = 'https://mscfapmjcysqsetlaulj.supabase.co';
      const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zY2ZhcG1qY3lzcXNldGxhdWxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTIyNDMsImV4cCI6MjA5ODIyODI0M30.2KQukivU9UVrjTfBtL56ffmlJXch3iDdRJNARYAvOZ0';
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      const scene    = document.querySelector('a-scene');
      const statusEl = document.getElementById('status');
      const listEl   = document.getElementById('list');
      function setStatus(m){ statusEl.textContent = m; }

      var myUid = null;       // 自分の匿名ユーザーID
      var tags = [];          // 表示中のタグ（各要素に _el = AR箱への参照を持たせる）
      var currentPos = null;

      // ===== ブロック10: 匿名サインイン（既存セッションがあれば再利用） =====
      async function ensureSignedIn(){
        var s = (await db.auth.getSession()).data.session;
        if (!s){
          var r = await db.auth.signInAnonymously();
          if (r.error) throw r.error;
          s = r.data.session;
        }
        return s.user.id;
      }

      // 現在地を覚える
      document.querySelector('[gps-new-camera]').addEventListener('gps-camera-update-position', function(e){
        currentPos = { lat: e.detail.position.latitude, lng: e.detail.position.longitude };
        if (statusEl.textContent.indexOf('現在地OK') === -1)
          setStatus('現在地OK（' + currentPos.lat.toFixed(5) + ',' + currentPos.lng.toFixed(5) + '）メモを打って貼れます');
      });

      // タグ1件をAR空間に箱として追加（自分=オレンジ / 他人=青）
      function addTagEntity(tag){
        var mine = (tag.user_id === myUid);
        var el = document.createElement('a-entity');
        el.setAttribute('geometry', 'primitive: box');
        el.setAttribute('material', 'color: ' + (mine ? '#ff851b' : '#0074d9'));
        el.setAttribute('scale', '3 3 3');
        el.setAttribute('position', '0 1.5 0');
        el.setAttribute('gps-new-entity-place', 'latitude: ' + tag.lat + '; longitude: ' + tag.lng);
        scene.appendChild(el);
        tag._el = el;
      }

      // 一覧UIを描き直す
      function renderList(){
        listEl.innerHTML = '<b>タグ一覧（' + tags.length + '）</b> あなた=' + (myUid ? myUid.slice(0,8) : '?') + '…';
        tags.forEach(function(t){
          var mine = (t.user_id === myUid);
          var row = document.createElement('div');
          row.style.cssText = 'display:flex; align-items:center; gap:8px; padding:4px 0; border-top:1px solid rgba(255,255,255,0.15);';
          row.innerHTML = '<span>' + (mine ? '🟠自分' : '🔵他人') + '</span><span style="flex:1;">' + t.body + '</span>';
          var btn = document.createElement('button');
          btn.textContent = '🗑';
          btn.style.cssText = 'font-size:15px; border:none; border-radius:5px; padding:4px 8px;';
          btn.addEventListener('click', function(){ deleteTag(t); });
          row.appendChild(btn);
          listEl.appendChild(row);
        });
      }

      // ===== ブロック11: 削除（RLSで自分の行だけ消える） =====
      async function deleteTag(tag){
        var r = await db.from('tags').delete().eq('id', tag.id).select();
        if (r.error){ setStatus('削除エラー: ' + r.error.message); return; }
        if (!r.data || r.data.length === 0){
          setStatus('消せません（他人のタグ。RLSが拒否）'); return;   // ← P3の肝: DBが他人のを弾く
        }
        if (tag._el) tag._el.parentNode.removeChild(tag._el);          // AR箱を消す
        tags = tags.filter(function(t){ return t.id !== tag.id; });    // 一覧から消す
        renderList();
        setStatus('自分のタグを消した（DBからも削除）');
      }

      // ===== ブロック8a: 起動時にDBから全タグを読んで描く =====
      async function loadTags(){
        var r = await db.from('tags').select('*');
        if (r.error){ setStatus('読込エラー: ' + r.error.message); return; }
        tags = [];
        r.data.forEach(addTagEntity);
        tags = r.data;
        renderList();
      }

      // ===== ブロック8b: 「ここに貼る」で保存（user_idは自分のIDで） =====
      document.getElementById('post').addEventListener('click', async function(){
        var body = document.getElementById('body').value.trim();
        if (!body){ setStatus('メモを入力して'); return; }
        if (!currentPos){ setStatus('位置取得中… 「現在地OK」が出てから押して'); return; }
        var lat = currentPos.lat + 0.00011;   // 真上だと見えないので約12m北
        var lng = currentPos.lng;
        var r = await db.from('tags').insert({ lat: lat, lng: lng, body: body, user_id: myUid }).select();
        if (r.error){ setStatus('保存エラー: ' + r.error.message); return; }
        addTagEntity(r.data[0]);
        tags.push(r.data[0]);
        renderList();
        document.getElementById('body').value = '';
        setStatus('貼った！北に約12m先（あなたのタグ）');
      });

      // ===== 初期化: サインイン → シーン準備 → タグ読込 =====
      (async function init(){
        try {
          myUid = await ensureSignedIn();
          setStatus('サインイン済み（あなた: ' + myUid.slice(0,8) + '…）画面を1回タップ→現在地OKを待って');
        } catch (e){ setStatus('サインイン失敗: ' + e.message); return; }
        if (!scene.hasLoaded) await new Promise(function(res){ scene.addEventListener('loaded', res); });
        await loadTags();
      })();
    </script>
  </body>
</html>
