<!DOCTYPE html>
<html>
  <head>
    <title>電脳タグ P1</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- 公式 hello-world と同じ2本構成: 位置計算の本体(THREEx) → A-Frame用ラッパ -->
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.7/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <!-- ブロック2: ここからAR空間。カメラ映像を背景にする -->
    <!-- DEBUG: 読み込み画面を消して裏側を見えるようにする（原因特定後に戻す） -->
    <a-scene
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
      renderer="antialias: true; alpha: true">

      <!-- ブロック3: 自分（端末）の位置と向き＝カメラ。GPSとコンパスを担当 -->
      <a-camera gps-new-camera="gpsMinDistance: 5"></a-camera>

      <!-- ブロック5: タグ本体。実機GPSの実測地点(35.522581,139.692001)の約20m北に1個浮かせる -->
      <a-entity
        geometry="primitive: box"
        material="color: #ff4136"
        scale="2 2 2"
        position="0 1.5 0"
        gps-new-entity-place="latitude: 35.522761; longitude: 139.692001"></a-entity>

    </a-scene>

    <!-- DEBUG: 画面に状態ログを出す（原因特定後に消す） -->
    <div id="dbg" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(0,0,0,0.65);color:#0f0;font:12px monospace;padding:6px;max-height:50%;overflow:auto;white-space:pre-wrap;"></div>
    <script>
      var dbg = document.getElementById('dbg');
      function log(m){ dbg.textContent = (new Date().toLocaleTimeString()+'  '+m+'\n') + dbg.textContent; }
      log('script start. aframe=' + (window.AFRAME ? 'OK' : 'MISSING'));
      window.addEventListener('error', function(e){ log('JS ERROR: ' + e.message); });
      window.addEventListener('unhandledrejection', function(e){ log('REJECT: ' + ((e.reason&&e.reason.message)||e.reason)); });
      document.addEventListener('arjs-video-loaded', function(){ log('camera video loaded ✅'); });
      document.addEventListener('camera-error', function(){ log('CAMERA ERROR ❌'); });
      var scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', function(){ log('scene loaded'); });
      // DEBUG: タグの座標（ブロック5と同じ値）。現在地からの距離と方角を出して箱を探しやすくする
      var TAG = { lat: 35.522761, lng: 139.692001 };
      function distBearing(lat, lng){
        var R = 6371000, toR = Math.PI/180;
        var dLat = (TAG.lat-lat)*toR, dLng = (TAG.lng-lng)*toR;
        var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat*toR)*Math.cos(TAG.lat*toR)*Math.sin(dLng/2)*Math.sin(dLng/2);
        var d = R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        var y = Math.sin(dLng)*Math.cos(TAG.lat*toR);
        var x = Math.cos(lat*toR)*Math.sin(TAG.lat*toR) - Math.sin(lat*toR)*Math.cos(TAG.lat*toR)*Math.cos(dLng);
        var brg = (Math.atan2(y, x)/toR + 360) % 360;
        return { d: d, brg: brg };
      }
      var cam = document.querySelector('[gps-new-camera]');
      cam.addEventListener('gps-camera-update-position', function(e){
        var p = e.detail.position;
        var r = distBearing(p.latitude, p.longitude);
        log('GPS ' + p.latitude.toFixed(6) + ',' + p.longitude.toFixed(6) + ' → 箱まで ' + r.d.toFixed(0) + 'm 方角' + r.brg.toFixed(0) + '°');
      });
    </script>
  </body>
</html>
